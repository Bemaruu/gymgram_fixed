name: gymgram_beta
description: "GymGram — la red social fitness. Feed, rutinas, nutrición y comunidad."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.0
  intl: ^0.20.2
  video_player: ^2.10.0

  supabase_flutter: ^2.8.4
  app_links: ^6.4.1
  purchases_flutter: ^8.0.0
  mixpanel_flutter: ^2.3.0
  http: ^1.2.2
  mobile_scanner: ^7.0.0
  flutter_image_compress: ^2.4.0
  firebase_core: ^3.8.0
  firebase_app_check: ^0.3.1+2
  firebase_messaging: ^15.1.6
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10
  phosphor_flutter: ^2.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  path_provider: ^2.1.4
  video_compress: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icono_app.png"
  min_sdk_android: 23
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/posts/
    - assets/medals/
    - assets/legal/
    - assets/icons/food/
    - assets/ranks/