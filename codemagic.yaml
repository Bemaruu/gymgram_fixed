workflows:

  ios-testflight:
    name: GymGram iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: gymgram-apple

    environment:
      # ios_signing removido a propósito: el bloque ios_signing automatico
      # falla en pre-flight si no hay profile, ANTES de que corran los scripts.
      # Hacemos signing manual abajo con app-store-connect + xcode-project.
      vars:
        BUNDLE_ID: com.gymgram.fit
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
      cocoapods: default

    # Build manual: lanzar desde el dashboard de Codemagic con "Start new build".
    # Para reactivar trigger por push, descomenta el bloque triggering:
    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Inicializar keychain
        script: keychain initialize

      - name: Generar private key + crear distribution certificate
        script: |
          set -e
          openssl genrsa -out /tmp/cm_dist.key 2048
          # Ver flags disponibles para debug (se imprime, no rompe build)
          app-store-connect certificates create --help || true
          # Pasar la key con sintaxis @file: (estandar Codemagic CLI)
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/cm_dist.key \
            --save \
            --verbose

      - name: Fetch/crear provisioning profile
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cm_dist.key \
            --create \
            --verbose

      - name: Instalar certificados en keychain
        script: keychain add-certificates

      - name: Aplicar profiles a Xcode
        script: xcode-project use-profiles

      - name: Build IPA (firmado, con dart-defines)
        script: |
          # Usamos flutter build ipa en un solo paso para que las --dart-define
          # se preserven hasta el archivo final. El flujo de dos pasos
          # (flutter build ios --no-codesign + xcode-project build-ipa) las
          # pierde porque xcodebuild re-corre el backend script de Flutter
          # sin nuestras flags. El export-options-plist lo crea
          # `xcode-project use-profiles` en step anterior.
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=MIXPANEL_TOKEN=$MIXPANEL_TOKEN \
            --dart-define=ADMIN_UID=$ADMIN_UID

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Credenciales tomadas de la integración `gymgram-apple`.
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - benjaminrodriguez177@gmail.com
        notify:
          success: true
          failure: true
