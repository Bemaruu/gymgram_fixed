workflows:

  ios-testflight:
    name: GymGram iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: gymgram-apple

    environment:
      # ios_signing removido a propósito: el bloque ios_signing automatico
      # falla en pre-flight si no hay profile, ANTES de que corran los scripts.
      # Hacemos signing manual abajo con app-store-connect + xcode-project.
      vars:
        BUNDLE_ID: com.gymgram.fit
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
      cocoapods: default

    # Build manual: lanzar desde el dashboard de Codemagic con "Start new build".
    # Para reactivar trigger por push, descomenta el bloque triggering:
    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Inicializar keychain
        script: keychain initialize

      - name: Crear distribution certificate (si no existe)
        script: |
          # Crear cert + generar private key en Codemagic. --save persiste
          # ambos asociados al API key para que fetch-signing-files los encuentre.
          # Si ya existe un cert con private key conocida, este step no hace daño.
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --save \
            --verbose || echo "create-certificate fallo (puede ser que ya exista uno valido). Continuamos."

      - name: Fetch/crear provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose

      - name: Instalar certificados en keychain
        script: keychain add-certificates

      - name: Aplicar profiles a Xcode
        script: xcode-project use-profiles

      - name: Flutter build iOS (sin firma)
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-number=$BUILD_NUMBER \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=MIXPANEL_TOKEN=$MIXPANEL_TOKEN \
            --dart-define=ADMIN_UID=$ADMIN_UID

      - name: Empaquetado IPA firmado
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Credenciales tomadas de la integración `gymgram-apple`.
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - benjaminrodriguez177@gmail.com
        notify:
          success: true
          failure: true
