workflows:

  ios-testflight:
    name: GymGram iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: gymgram-apple

    environment:
      # ios_signing removido a propósito: el bloque ios_signing automatico
      # falla en pre-flight si no hay profile, ANTES de que corran los scripts.
      # Hacemos signing manual abajo con app-store-connect + xcode-project.
      groups:
        # Importar los grupos donde estan las dart-defines (Codemagic UI
        # los pone en grupos por defecto). Sin esto el workflow no las ve.
        - plain   # SUPABASE_URL, MIXPANEL_TOKEN
        - secure  # SUPABASE_ANON_KEY, ADMIN_UID
      vars:
        BUNDLE_ID: com.gymgram.fit
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
      cocoapods: default

    # Build manual: lanzar desde el dashboard de Codemagic con "Start new build".
    # Para reactivar trigger por push, descomenta el bloque triggering:
    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Inicializar keychain
        script: keychain initialize

      - name: Limpiar certs viejos + crear distribution certificate
        script: |
          set -e

          # 1. Generar private key local para el nuevo cert.
          openssl genrsa -out /tmp/cm_dist.key 2048

          # 2. Revocar cualquier IOS_DISTRIBUTION existente. Esto evita
          #    error 409 "You already have a current iOS Distribution
          #    certificate" cuando builds anteriores dejaron certs sin
          #    su private key accesible (caso tipico en CI ephemeral).
          echo "Listando certs IOS_DISTRIBUTION existentes..."
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --json > /tmp/existing_certs.json || echo "[]" > /tmp/existing_certs.json

          EXISTING_IDS=$(python3 -c "
          import json, sys
          try:
              with open('/tmp/existing_certs.json') as f:
                  data = json.load(f)
              if isinstance(data, dict): data = data.get('data', [])
              for c in data:
                  cid = c.get('id') or c.get('attributes', {}).get('id')
                  if cid: print(cid)
          except Exception as e:
              print(f'(no certs o error parseando: {e})', file=sys.stderr)
          ")

          if [ -n "$EXISTING_IDS" ]; then
            echo "Revocando certs existentes:"
            for CERT_ID in $EXISTING_IDS; do
              echo "  - $CERT_ID"
              app-store-connect certificates delete "$CERT_ID" \
                --ignore-not-found 2>&1 || echo "    (no se pudo revocar, continuamos)"
            done
          else
            echo "No hay certs IOS_DISTRIBUTION previos."
          fi

          # 3. Crear cert nuevo con la private key recien generada.
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/cm_dist.key \
            --save \
            --verbose

      - name: Fetch/crear provisioning profile
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cm_dist.key \
            --create \
            --verbose

      - name: Instalar certificados en keychain
        script: keychain add-certificates

      - name: Aplicar profiles a Xcode
        script: xcode-project use-profiles

      - name: Verificar dart-defines configurados
        script: |
          # Fail-fast si alguna env var critica esta vacia. Asi no subimos
          # un IPA roto a TestFlight (problema diagnosticado en build pasada).
          MISSING=""
          [ -z "$SUPABASE_URL" ]      && MISSING="$MISSING SUPABASE_URL"
          [ -z "$SUPABASE_ANON_KEY" ] && MISSING="$MISSING SUPABASE_ANON_KEY"
          [ -z "$MIXPANEL_TOKEN" ]    && MISSING="$MISSING MIXPANEL_TOKEN"
          [ -z "$ADMIN_UID" ]         && MISSING="$MISSING ADMIN_UID"

          if [ -n "$MISSING" ]; then
            echo ""
            echo "============================================================"
            echo "ERROR: Variables de entorno faltantes en Codemagic:"
            for v in $MISSING; do echo "  - $v"; done
            echo ""
            echo "Solucion: Codemagic > App > Environment variables. Agregar"
            echo "los nombres exactos (case-sensitive) con sus valores."
            echo "SUPABASE_URL, MIXPANEL_TOKEN, ADMIN_UID pueden ir como"
            echo "plain. SUPABASE_ANON_KEY como secure."
            echo "============================================================"
            exit 1
          fi

          echo "OK: todas las dart-defines estan configuradas."
          echo "  SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "  SUPABASE_ANON_KEY length: ${#SUPABASE_ANON_KEY}"
          echo "  MIXPANEL_TOKEN length: ${#MIXPANEL_TOKEN}"
          echo "  ADMIN_UID length: ${#ADMIN_UID}"

      - name: Build IPA (firmado, con dart-defines)
        script: |
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=MIXPANEL_TOKEN="$MIXPANEL_TOKEN" \
            --dart-define=ADMIN_UID="$ADMIN_UID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Credenciales tomadas de la integración `gymgram-apple`.
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - benjaminrodriguez177@gmail.com
        notify:
          success: true
          failure: true
