| lib/ui/xxx.dart | Pantalla actualizada |

**3. Archivos creados**
[Lista de archivos nuevos]

**4. Riesgos identificados**
[Qué podría fallar o necesitar atención]

**5. Cómo probar**
[Pasos exactos para verificar que funciona]

**6. Resultado esperado**
[Qué debe verse/comportarse diferente]

**7. Pendiente de confirmación** (si aplica)
[Pregunta explícita antes de ejecutar cambio crítico]

**8. Análisis ejecutado**
[Resultado de flutter analyze o verificación]
---"""
