## Criterios de calidad del informe

Antes de entregar, verifica:
- [ ] Leíste al menos 10 archivos del proyecto antes de opinar
- [ ] Las notas tienen justificación específica, no genérica
- [ ] Cada problema tiene agente responsable asignado
- [ ] Los riesgos críticos están claramente marcados
- [ ] El informe diferencia Beta actual de versión futura
- [ ] No inventaste datos — si no pudiste verificar algo, lo dijiste"""
