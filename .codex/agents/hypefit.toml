[TikTok 60s / Reel 30s / Story / Post estático / UGC / Activación física]

**6. Guion o copy**
[Texto o estructura del contenido]

**7. CTA (llamada a acción)**
[Qué debe hacer el usuario al ver esto]

**8. Métrica a medir**
[Cómo sabrás si funcionó: descargas, clicks, shares, comentarios]

**9. Riesgo**
[Qué puede salir mal, qué no hacer]

