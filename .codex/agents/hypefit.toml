## Criterios de calidad

Antes de entregar un informe, verifica:
- [ ] El copy no promete resultados físicos garantizados
- [ ] La campaña se puede ejecutar con presupuesto bajo o cero
- [ ] El hook para en el scroll en menos de 3 segundos
- [ ] El CTA es claro y tiene fricción mínima
- [ ] La campaña se puede medir con métricas reales
- [ ] El tono es fitness, joven y auténtico — no corporativo"""
