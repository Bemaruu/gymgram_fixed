<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GymGram — Restablecer contraseña</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         min-height:100vh;display:flex;flex-direction:column;align-items:center;
         justify-content:center;background:#111827;color:#f9fafb;padding:24px;text-align:center}
    .logo{font-size:1.8rem;font-weight:800;color:#ff6b35;letter-spacing:-.5px;margin-bottom:8px}
    .sub{font-size:.95rem;color:#9ca3af;margin-bottom:40px}
    .btn{display:inline-block;padding:16px 40px;background:#ff6b35;color:#fff;
         font-size:1rem;font-weight:700;border-radius:14px;text-decoration:none;
         box-shadow:0 4px 20px rgba(255,107,53,.4);transition:opacity .15s}
    .btn:active{opacity:.85}
    .note{margin-top:20px;font-size:.78rem;color:#6b7280;max-width:320px;line-height:1.45}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="logo">GymGram</div>
  <div class="sub">Restablecer contraseña</div>
  <a id="openBtn" class="btn" href="#">Abrir GymGram</a>
  <p class="note">Toca el botón para continuar en la app y crear tu nueva contraseña.</p>
  <p id="notInstalled" class="note hidden">
    Si no tienes GymGram instalada, descárgala primero y vuelve a tocar el enlace del correo.
  </p>

  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      var params = new URLSearchParams(window.location.search);
      var code = params.get('code') || '';
      var tokenHash = params.get('token_hash') || '';
      var type = params.get('type') || 'recovery';

      var qs = [];
      if (code) qs.push('code=' + encodeURIComponent(code));
      if (tokenHash) qs.push('token_hash=' + encodeURIComponent(tokenHash));
      if (type) qs.push('type=' + encodeURIComponent(type));
      var query = qs.join('&');

      var iosScheme = 'com.gymgram.fit';
      var androidScheme = 'com.gymgram.app';
      var androidPackage = 'com.gymgram.app';

      var iosUrl = query
        ? iosScheme + '://password-reset?' + query
        : iosScheme + '://password-reset';

      var fallback = encodeURIComponent('https://gymgram.fit/');
      var intentHost = 'password-reset' + (query ? '?' + query : '');
      var intentUrl = 'intent://' + intentHost +
        '#Intent;scheme=' + androidScheme +
        ';package=' + androidPackage +
        ';S.browser_fallback_url=' + fallback +
        ';end';

      var openUrl;
      if (isIOS) {
        openUrl = iosUrl;
      } else if (isAndroid) {
        openUrl = intentUrl;
      } else {
        openUrl = iosUrl;
        document.getElementById('notInstalled').classList.remove('hidden');
      }

      var btn = document.getElementById('openBtn');
      btn.setAttribute('href', openUrl);
    })();
  </script>
</body>
</html>
