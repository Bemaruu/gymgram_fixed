<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pl_disc" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#F4F6F8"/>
      <stop offset="45%" stop-color="#A0A8B0"/>
      <stop offset="100%" stop-color="#3E454D"/>
    </radialGradient>
    <linearGradient id="pl_rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8DCE2"/>
      <stop offset="50%" stop-color="#7A8088"/>
      <stop offset="100%" stop-color="#2A2E33"/>
    </linearGradient>
    <linearGradient id="pl_shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pl_shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#B8BFC7"/>
      <stop offset="100%" stop-color="#4E555D"/>
    </linearGradient>
  </defs>

  <!-- Outer rim -->
  <circle cx="100" cy="100" r="94" fill="url(#pl_rim)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#1B1E22" stroke-width="2"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#22262B" stroke-width="1.5"/>

  <!-- Inner disc -->
  <circle cx="100" cy="100" r="78" fill="url(#pl_disc)"/>

  <!-- Heater shield with double chevron -->
  <g>
    <path d="M70 58 L130 58 L130 110 Q130 138 100 152 Q70 138 70 110 Z"
          fill="url(#pl_shield)" stroke="#2A2E33" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Facet bisects -->
    <path d="M70 58 L100 110 L130 58 Z" fill="#FFFFFF" opacity="0.18"/>
    <path d="M70 58 L100 110 L100 152 Q70 138 70 110 Z" fill="#000000" opacity="0.08"/>

    <!-- Double chevron -->
    <path d="M80 84 L100 72 L120 84 L100 96 Z" fill="#4E555D" opacity="0.85"/>
    <path d="M83 86 L100 76 L117 86 L100 94 Z" fill="#F4F6F8" opacity="0.6"/>
    <path d="M80 108 L100 96 L120 108 L100 120 Z" fill="#4E555D" opacity="0.85"/>
    <path d="M83 110 L100 100 L117 110 L100 118 Z" fill="#F4F6F8" opacity="0.6"/>

    <!-- Top highlight -->
    <path d="M72 62 L128 62 L120 70 L80 70 Z" fill="#FFFFFF" opacity="0.35"/>
  </g>

  <!-- Top disc shine -->
  <ellipse cx="100" cy="50" rx="58" ry="20" fill="url(#pl_shine)"/>
</svg>
