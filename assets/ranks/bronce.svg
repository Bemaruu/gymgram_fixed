<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="br_disc" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#F4C58A"/>
      <stop offset="45%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#4A2A0F"/>
    </radialGradient>
    <linearGradient id="br_rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0A063"/>
      <stop offset="50%" stop-color="#8B5223"/>
      <stop offset="100%" stop-color="#2E1808"/>
    </linearGradient>
    <linearGradient id="br_shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="br_shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B3"/>
      <stop offset="50%" stop-color="#D88944"/>
      <stop offset="100%" stop-color="#6E3A12"/>
    </linearGradient>
  </defs>

  <!-- Outer rim -->
  <circle cx="100" cy="100" r="94" fill="url(#br_rim)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#1F0F04" stroke-width="2"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#28140A" stroke-width="1.5"/>

  <!-- Inner disc -->
  <circle cx="100" cy="100" r="78" fill="url(#br_disc)"/>

  <!-- Shield (heater) -->
  <g>
    <path d="M70 58 L130 58 L130 110 Q130 138 100 152 Q70 138 70 110 Z"
          fill="url(#br_shield)" stroke="#3D1F0A" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Rivets on shield -->
    <circle cx="78" cy="66" r="2.5" fill="#3D1F0A"/>
    <circle cx="122" cy="66" r="2.5" fill="#3D1F0A"/>
    <circle cx="78" cy="118" r="2.5" fill="#3D1F0A"/>
    <circle cx="122" cy="118" r="2.5" fill="#3D1F0A"/>
    <!-- Center emblem: chevron -->
    <path d="M82 90 L100 76 L118 90 L100 104 Z" fill="#5C2E0F" opacity="0.85"/>
    <path d="M86 92 L100 82 L114 92 L100 102 Z" fill="#FFE0B3" opacity="0.5"/>
    <!-- Shield top highlight -->
    <path d="M72 62 L128 62 L120 70 L80 70 Z" fill="#FFFFFF" opacity="0.25"/>
  </g>

  <!-- Top disc shine -->
  <ellipse cx="100" cy="50" rx="58" ry="20" fill="url(#br_shine)"/>
</svg>
