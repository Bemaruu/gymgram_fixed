<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pt_disc" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="45%" stop-color="#4FC3D8"/>
      <stop offset="100%" stop-color="#0F4753"/>
    </radialGradient>
    <linearGradient id="pt_rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BFF1FA"/>
      <stop offset="50%" stop-color="#3D8FA0"/>
      <stop offset="100%" stop-color="#0A2E36"/>
    </linearGradient>
    <linearGradient id="pt_shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pt_c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#7FDCEA"/>
    </linearGradient>
    <linearGradient id="pt_c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BFF1FA"/>
      <stop offset="100%" stop-color="#2A6E7E"/>
    </linearGradient>
    <linearGradient id="pt_c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3D8"/>
      <stop offset="100%" stop-color="#0F4753"/>
    </linearGradient>
  </defs>

  <!-- Outer rim -->
  <circle cx="100" cy="100" r="94" fill="url(#pt_rim)"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#06222A" stroke-width="2"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#0A2E36" stroke-width="1.5"/>

  <!-- Inner disc -->
  <circle cx="100" cy="100" r="78" fill="url(#pt_disc)"/>

  <!-- Crystal: faceted angular gem -->
  <g stroke="#06222A" stroke-width="1.8" stroke-linejoin="round">
    <!-- Top cap -->
    <path d="M100 46 L72 78 L100 88 L128 78 Z" fill="url(#pt_c1)"/>
    <!-- Left body -->
    <path d="M72 78 L100 88 L92 150 L78 116 Z" fill="url(#pt_c2)"/>
    <!-- Right body -->
    <path d="M128 78 L100 88 L108 150 L122 116 Z" fill="url(#pt_c3)"/>
    <!-- Bottom point -->
    <path d="M92 150 L100 88 L108 150 L100 158 Z" fill="url(#pt_c2)"/>
    <!-- Highlight strip -->
    <path d="M100 46 L100 88 L100 158" stroke="#E0F7FA" stroke-width="1" opacity="0.55" fill="none"/>
    <path d="M86 60 L92 84" stroke="#FFFFFF" stroke-width="2" opacity="0.6" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Top disc shine -->
  <ellipse cx="100" cy="50" rx="58" ry="20" fill="url(#pt_shine)"/>
</svg>
